version: 1

profiles:
  backend-developer:
    allowed_tools: [Read, Write, Edit, MultiEdit, Bash, Grep, Glob]
    denied_tools: [WebSearch, WebFetch]
    bash_allow_patterns:
      - "pytest*"
      - "python3*"
      - "git add*"
      - "git commit*"
      - "git push origin*"
      - "pip install*"
      - "bash -n*"
    bash_deny_patterns:
      - "rm -rf*"
      - "git reset --hard*"
      - "git push --force*"
      - "git push -f*"
      - "curl*anthropic*"
    file_write_scope:
      - "scripts/**"
      - "tests/**"
      - "dashboard/**"

  test-engineer:
    allowed_tools: [Read, Write, Edit, Bash, Grep, Glob]
    denied_tools: [WebSearch, WebFetch, MultiEdit]
    bash_allow_patterns:
      - "pytest*"
      - "python3 -m pytest*"
      - "python3 -m py_compile*"
      - "git add*"
      - "git commit*"
    bash_deny_patterns:
      - "rm -rf*"
      - "git push*"
      - "git reset*"
    file_write_scope:
      - "tests/**"
      - "scripts/check_*"

  frontend-developer:
    allowed_tools: [Read, Write, Edit, MultiEdit, Bash, Grep, Glob]
    denied_tools: [WebSearch, WebFetch]
    bash_allow_patterns:
      - "npm*"
      - "npx*"
      - "node*"
      - "git add*"
      - "git commit*"
    bash_deny_patterns:
      - "rm -rf*"
      - "git push --force*"
    file_write_scope:
      - "dashboard/**"

terminal_assignments:
  T1: backend-developer
  T2: test-engineer
  T3: frontend-developer
