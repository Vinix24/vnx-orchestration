# field-tests task registry
# Each task lives in tasks/<tier>/<NN_slug>/ with instruction.md + verify.py
# Inspiratie-bron in `source` field — citeerbaar in marketing output

version: 1

tiers:
  t1_trivial:
    description: "Mechanical refactor, single/few-file, ~5 min wallclock"
    lanes: &bench_lanes_10
      - claude-opus-4-8
      - claude-opus-4-7
      - claude-opus-4-6
      - claude-sonnet-4-6
      - codex-gpt-5-4
      - codex-gpt-5-5
      - kimi-k2-7-code
      - glm-5          # base GLM-5 (Feb 2026) baseline
      - glm-5-1        # real GLM-5.1 (was wrongly mapped to base glm-5)
      - glm-5-2        # GLM-5.2 (2026-06-16)
      - deepseek-v4-pro-harness
      - deepseek-v4-flash-harness
      - glm-5-harness    # GLM via full claude-CLI harness (litellm proxy → OpenRouter); harness-vs-runner comparison
      - glm-5-1-harness
      - glm-5-2-harness
    n_replications: 3

  t2_medium:
    description: "Multi-file refactor + tests + migration, bounded scope, ~15-25 min"
    lanes: *bench_lanes_10
    n_replications: 3

  t3_complex:
    description: "Cross-module state, security boundaries, introspection-heavy, >1h"
    lanes: *bench_lanes_10
    n_replications: 2

  t4_frontier:
    description: "Frontier discriminators — graded 0-5 rubric, naive ~2-3, deep ~5; separates top models"
    lanes: *bench_lanes_10
    n_replications: 2

  t5_review_design:
    description: "Review/design CHARACTER — not who writes correct code, but which defect classes a model catches and how it decomposes a system. Deterministic detection-rate + coverage checklist; run with --no-judge."
    lanes: *bench_lanes_10
    n_replications: 2

tasks:
  - id: "01_yaml_config_refactor"
    tier: t1_trivial
    folder: "tasks/t1_trivial/01_yaml_config_refactor"
    source: "MC PR #236 worker queues YAML"
    skill: backend-developer
    target_loc: 60
    deadline_seconds: 1800  # all-night claude run: generous headroom for thinking models
    pattern: "pattern-match-bounded"
    verify_type: "test_pass_count"
    expected_tests: 5

  - id: "02_rls_policy"
    tier: t1_trivial
    folder: "tasks/t1_trivial/02_rls_policy"
    source: "SEOcrawler PR #125 enable RLS on scan_quota"
    skill: database-engineer
    target_loc: 30
    deadline_seconds: 1200  # 900 cut off genuine opus completions in the tmux lane (911s/908s observed under load: warmup overhead the API lanes don't have). 1200 gives headroom; #893 (125s warmup-abort) + work-started watchdog still fast-abort true stalls, so this only costs time on legitimately-slow work, never on hangs.
    pattern: "pattern-match-bounded"
    verify_type: "sql_constraint_check"

  - id: "03_dotenv_script"
    tier: t1_trivial
    folder: "tasks/t1_trivial/03_dotenv_script"
    source: "SEOcrawler PR #119 add load_dotenv()"
    skill: backend-developer
    target_loc: 15
    deadline_seconds: 1800  # all-night claude run: generous headroom for thinking models
    pattern: "pattern-match-bounded"
    verify_type: "runtime_smoke"

