# VNX Smart Routing — Provider Constraints SSOT
#
# Single source of truth for the hard guard-rails around which provider may
# serve which role/lane. Loaded by:
#   - dispatcher pre-flight check (forbid_route / require_route)
#   - routing engine lane validation (routing_policy.yaml selection)
#   - CI grep (forbid_import patterns)
#   - audit pipeline (severity tagging on receipts)
#
# Schema (per entry under `constraints`):
#   id               kebab-case identifier, stable across versions
#   rule             forbid_route | require_route | forbid_import
#   forbidden_route  optional, used with rule=forbid_route
#                    keys: provider, model (str|list), role (str|list),
#                          task_class (str|list), via (str)
#   required_route   optional, used with rule=require_route
#                    keys: provider, model, role (str|list)
#   forbidden_import optional, used with rule=forbid_import
#                    keys: patterns (list of substrings or simple regex)
#   reason           human-readable justification (cite memory ref or ADR)
#   enforcement      code_raise | code_warn | ci_grep
#   audit_severity   blocking | warn | info
#   override_allowed bool; when true operator may bypass via env flag
#                    VNX_OVERRIDE_<UPPERCASED_ID_WITH_UNDERSCORES>=1

version: 1

constraints:
  - id: kimi-via-cli-only
    rule: forbid_route
    forbidden_route:
      provider: moonshot
      via: [api, moonshot]
    reason: >-
      Kimi K2/K2.6 routing in Wave 7 PR-7.7 uses the kimi CLI OAuth lane
      (`kimi login`) to avoid API-key management and rate-limit volatility.
      Direct Moonshot API routing (including litellm:moonshot sub-provider)
      competes with the CLI lane and breaks cost tracking attribution.
    enforcement: code_raise
    audit_severity: blocking
    override_allowed: false

  - id: t0-opus-only
    rule: require_route
    required_route:
      role: T0
      model: claude-opus-4-7
    reason: >-
      T0 orchestrator performs gate evaluation across the full NDJSON ledger
      under multi-PR concurrency. Sonnet-grade reasoning regresses on missed
      gates; downgrade is only acceptable with explicit operator approval.
    enforcement: code_warn
    audit_severity: warn
    override_allowed: true

  - id: workers-sonnet-pinned
    rule: require_route
    required_route:
      role: [T1, T2, T3]
      model: claude-sonnet-4-6
    reason: >-
      Worker terminals standardize on Sonnet 4.6 for cost-quality balance.
      Haiku regresses on multi-file edits; Opus is reserved for T0 so the
      monthly budget stays predictable.
    enforcement: code_warn
    audit_severity: warn
    override_allowed: true

  - id: no-anthropic-sdk
    rule: forbid_import
    forbidden_import:
      patterns:
        - "import anthropic"
        - "from anthropic import"
        - "anthropic.Anthropic("
        - "@anthropic-ai/sdk"
    reason: >-
      VNX is a CLI-driven runtime. Importing the Anthropic SDK with OAuth
      credentials risks an Anthropic account ban (opencode/openclaw
      precedent — see feedback_avoid_claude_sdk_use_cli_oauth.md). All
      Claude work flows through the `claude` CLI via subprocess.
    enforcement: ci_grep
    audit_severity: blocking
    override_allowed: false

  - id: zai-via-openrouter-only
    rule: forbid_route
    forbidden_route:
      provider: zai
      via: direct
    reason: >-
      Native Zhipu integration is deferred. Wave 7 PR-7.3 routes GLM-5.1
      through OpenRouter; direct Zhipu API calls bypass the cost-tracking
      pipeline and the fallback chain configured in routing_policy.yaml.
    enforcement: code_raise
    audit_severity: blocking
    override_allowed: false

  - id: deprecated-glm-models
    rule: forbid_route
    forbidden_route:
      provider: zai
      model: [glm-4.5, glm-4.6]
    reason: >-
      GLM-4.5 and GLM-4.6 are legacy and superseded by GLM-5.1 (verified
      2026-05-10, project_kimi_glm_integration_paths.md). The provider
      will retire the legacy snapshots; new dispatches must use the
      glm-5.1-default model key.
    enforcement: code_raise
    audit_severity: blocking
    override_allowed: false

  - id: glm-via-harness-only
    rule: forbid_route
    forbidden_route:
      provider: zai
      via: [openrouter, litellm]
    reason: >-
      GLM must run via the claude-CLI harness lane (provider glm-harness → the local
      :4141 litellm proxy → OpenRouter), never the plain single-shot litellm runner
      (litellm:zai). The plain runner is far less capable (no agentic tool-use; proven
      live to echo bash instead of running it). The door normalizes litellm:zai → glm-harness
      at the bridge (dispatch_bridge alias); this constraint is the BACKSTOP for any direct
      spec that still presents the plain zai runner (via=openrouter/litellm). glm-harness
      carries the distinct via=claude_harness_openrouter, so it clears. Benchmark baselines
      that intentionally measure the plain litellm:zai runner set VNX_OVERRIDE_GLM_VIA_HARNESS_ONLY=1.
    enforcement: code_raise
    audit_severity: blocking
    override_allowed: true

  - id: deepseek-harness-subscription-blocked
    rule: forbid_route
    forbidden_route:
      provider: deepseek
      via: claude_harness_subscription
    reason: >-
      DeepSeek via Claude-harness (ANTHROPIC_BASE_URL redirect) is ALLOWED
      with own DeepSeek API-key + hardening: ANTHROPIC_BASE_URL pointing to
      DeepSeek endpoint, ANTHROPIC_API_KEY set to own DeepSeek key,
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 (+ DISABLE_TELEMETRY +
      DISABLE_AUTOUPDATER + DISABLE_ERROR_REPORTING), and MCP disabled
      (--strict-mcp-config --mcp-config '{"mcpServers":{}}'). Measured on
      claude v2.1.150 (2026-05-26): 0 calls to api.anthropic.com, all
      inference routes to the DeepSeek endpoint. BLOCKED only when routing
      through the production OAuth subscription without an own API key —
      that redirects the protected account identity to DeepSeek, which is
      the same ban-as as no-anthropic-sdk. Use via=claude_harness_keyed
      when operating with own key + hardening.
    enforcement: code_raise
    audit_severity: blocking
    override_allowed: false

  - id: claude-headless
    rule: forbid_route
    forbidden_route:
      provider: claude
      via: headless
    reason: >-
      Account-protection and billing: the claude_headless lane runs `claude -p`
      via subprocess_adapter on api-metered billing. Blocked by default; opened
      explicitly with VNX_OVERRIDE_CLAUDE_HEADLESS=1.
    enforcement: code_raise
    audit_severity: blocking
    override_allowed: true
