# Wave 7 cost-routing policy
# Maps task-class + complexity to preferred provider lane
# Default: Anthropic Sonnet 5 (untouched safety default)

version: 1
default_lane: "claude/sonnet-5"

# Task-class -> lane mapping
# First match wins; no match -> default_lane
rules:
  - name: simple-cleanup
    when:
      task_class: ["lint-narrow", "doc-update", "oi-closure", "rename"]
      complexity: ["low"]
    lane: "claude/haiku-4-5"  # 3x cheaper than Sonnet, sufficient for simple work
    rationale: "Low-complexity housekeeping; Haiku matches quality for these tasks at 1/3 cost"

  - name: refactor-code-default
    when:
      task_class: ["refactor", "module-split", "feature-implementation"]
      complexity: ["medium", "high"]
    lane: "claude/sonnet-5"  # quality-default for code
    rationale: "Refactor needs depth; Sonnet 5 remains baseline"

  - name: cost-optimized-code
    when:
      task_class: ["refactor", "feature-implementation"]
      complexity: ["medium"]
      opt_in_flag: "VNX_USE_CHEAP_LANE"  # operator opt-in only
    lane: "litellm:deepseek:deepseek-v4-pro"  # $0.28/$0.40 - 10x cheaper input than Sonnet
    rationale: "Mid-complexity code with operator opt-in; deepseek-v4-pro ranks competitive on coding benchmarks"

  - name: review-analysis
    when:
      task_class: ["code-review", "analysis", "summarization"]
    lane: "kimi"  # kimi CLI OAuth lane — kimi-via-cli-only constraint enforced
    rationale: "Long-context review/analysis routes to the Kimi K2 CLI lane (OAuth, $0 subscription quota). litellm:moonshot is blocked by kimi-via-cli-only (provider_constraints.yaml)."

  - name: research-deep
    when:
      task_class: ["research", "design-doc", "system-architect"]
      complexity: ["high"]
    lane: "claude/opus"  # premium for deep research
    rationale: "Architect-level work warrants Opus quality"

# Fallback chain when preferred lane fails (API down, rate-limited, etc)
#
# STATUS (2026-07-09, OI-223 lane_safety loader): still ADVISORY. decide_lane()
# reads this block and resolves a chain onto RoutingDecision.fallback_chain, but
# subprocess_dispatch._select_dispatch_path deliberately discards it for non-Claude
# lanes ("This function never touches fallback_chain for non-Claude lanes") to avoid
# silently rerouting a cheap-lane dispatch back onto Claude. No caller triggers
# automatic lane switching on a failure. This is unrelated to the lane_safety block
# below — OI-223 wired lane_safety.headless_block live, NOT fallback_chain. The kimi
# entry below reflects the corrected kimi CLI lane — litellm:moonshot:* entries are
# kept for reference but litellm:moonshot routing is blocked by kimi-via-cli-only.
fallback_chain:
  "litellm:deepseek:*": ["kimi", "claude/sonnet-5"]
  "kimi": ["litellm:deepseek:deepseek-v4-pro", "claude/sonnet-5"]
  "litellm:zai:*": ["kimi", "claude/sonnet-5"]
  "claude/haiku-4-5": ["claude/sonnet-5"]
  # Sonnet and Opus have no fallback (they are the safety net)

# Lane-safety rules.
#
# STATUS (2026-07-09, OI-223 lane_safety loader): the loader is now LIVE.
# scripts/lib/routing_policy.load_lane_safety() parses this block and
# is_claude_headless_blocked() reads `headless_block` below; both are
# consulted at scripts/lib/dispatch_bridge.py (pre-stage reject) and
# scripts/lib/dispatch_cli.py::_execute_claude_headless (the last gate
# before spawn) instead of a hardcoded env-only check. Every OTHER entry in
# this block (force_headless, claude_serial_under_load, codex_retry_once,
# kimi_quota_fail_fast, tmux_spawn_max_runtime, haiku_receipt_nondeterminism)
# remains DECLARATIVE — exposed by load_lane_safety() for tooling/tests, but
# not read by any runtime gating decision. Do not rely on them as live guards.
lane_safety:
  # claude-headless-lane-block (OI-223 fold-in). LIVE as of this PR — see
  # is_claude_headless_blocked() above. Refuses the claude_headless lane
  # (`claude -p`, API-metered) by default; the tmux subscription lane stays
  # the default for claude. Protects the production OAuth subscription
  # post-2026-06-15 billing cutover (headless now bills API credits, not
  # subscription quota). Set enabled: false here to lift the block yaml-side,
  # or export the override_env var =1 to opt in per-dispatch.
  headless_block:
    enabled: true
    override_env: "VNX_OVERRIDE_CLAUDE_HEADLESS"
    reason: "claude -p (headless) is API-metered post-2026-06-15 cutover; the tmux subscription lane is the safe default for claude"

  # Anthropic Claude Code interactive-session hang (Issues #63390 + #64153).
  # Measured 2026-06-04/05: opus-4-8/4-7 + sonnet-5 hang for hours or exit
  # in 0.1s on complex content via the interactive tmux lane. The headless
  # `claude -p` path is unaffected. Force these models to the headless lane
  # until Anthropic ships a fix.
  #
  # SUPERSEDED (2026-06-15 empirical re-test, scripts/benchmark/field-tests/
  # runners/lane_adapter.py HEADLESS_FORCED_MODELS): opus-4-8/4-7/sonnet-4-6
  # completed trivial tasks cleanly on the tmux lane post-cutover; the hang did
  # NOT reproduce, so that runner emptied its forced-model set. Left DECLARATIVE
  # here (not wired into routing) deliberately: forcing these models onto
  # headless would fight headless_block above and re-introduce the exact
  # API-billing exposure OI-223 closes. Re-activate only via an explicit
  # operator decision if the hang reproduces on a t3-complex (>1h) run.
  force_headless:
    models:
      - claude-opus-4-8
      - claude-opus-4-8
      - claude-sonnet-5
    reason: "Anthropic interactive-hang (#63390 + #64153)"
    review_trigger: "Anthropic fix-release OR 2026-06-15 billing cutover"
    monitored_by: "OI-215 (weekly GitHub issue check)"

  # Subscription per-prompt-complexity throttle observed under parallel claude
  # load: many sequential complex dispatches exhaust capacity mid-run. Pace
  # claude lanes serially; provider lanes (kimi/deepseek/codex) stay parallel.
  claude_serial_under_load:
    enabled: true
    reason: "Subscription complexity-throttle measured 2026-06-04 parallel=3 bench"

  # Codex lane flakiness: 2 DNFs over 8 T3 cell-attempts on 2026-06-06
  # (1 instant lane-launch failure at 0.1s, 1 mid-run rc=1 after 196s WITH a
  # report on disk). Clean cells score top-cluster (4.79-4.93), so the lane is
  # worth keeping — but a single attempt is not a verdict. Retry once before
  # scoring a codex cell or dispatch as DNF.
  codex_retry_once:
    models:
      - codex-gpt-5-4
    max_retries: 1
    reason: "Measured 2/8 DNF-rate 2026-06-06; clean-cell quality top-cluster"
    review_trigger: "skill-aware re-bench 2026-06-08 DNF-rate"

  # Kimi CLI quota exhausts mid-billing-cycle (measured 2026-06-07: quota_or_auth
  # 'usage limit for this billing cycle' on first dispatch attempt). Retrying a
  # quota-exhausted lane burns wallclock for guaranteed failure. On the
  # quota_or_auth signature: skip retries entirely, go straight to the
  # fallback_chain entry for litellm:moonshot:*.
  kimi_quota_fail_fast:
    providers:
      - litellm:moonshot
    on_error_reason: "quota_or_auth"
    max_retries: 0
    reason: "Quota-exhaustion measured 2026-06-07; deterministic failure until cycle reset"

  # tmux-spawn has receipt-deadline failures on long-running workers (documented
  # lane gap, t0-orchestrator skill §9.2). Workers with an expected runtime
  # over 30 min must route via subprocess_dispatch instead.
  tmux_spawn_max_runtime:
    lane: "tmux-spawn"
    max_expected_runtime_seconds: 1800
    overflow_route: "subprocess"
    reason: "Receipt-deadline failures on >30min workers; known lane gap"

  # Haiku on trivial tasks via tmux-spawn produced receipts non-deterministically
  # (measured 2026-06: 10-worker load test, 10/10 clean teardown but 5/10
  # receipts). Receipt-critical dispatches on haiku need a receipt-presence
  # check + one redispatch, or route headless.
  haiku_receipt_nondeterminism:
    models:
      - claude-haiku-4-5
    receipt_verify: true
    max_redispatch: 1
    reason: "5/10 receipts on trivial tmux-spawn tasks, 10-worker load test"

# Provider cost reference (2026-06-06 measured, per-dispatch on T3 cells):
#   kimi-k2-6 / kimi-k2-0905 : $0       (subscription/OAuth; quota-capped per cycle)
#   claude-* (subscription)  : $0       (interactive/headless pre-2026-06-15)
#   deepseek-v4-pro-harness  : ~$0.02-0.03  (own API key)
#   codex-gpt-5-4            : ~$1.58 avg/cell over 6 T3 cells ($9.46 total),
#                              typical $0.91-1.46, p95 outlier $4.51 — budget on
#                              p95, not median ($1.25/$10 per Mtok)
# Task-pattern routing (Kimi=refactor, DeepSeek=debug, Opus=architecture) is
# DEFERRED to the skill-aware re-bench (OI-221) — current T3 data was not
# apples-to-apples on skill context. Do not encode pattern-routing until then.
