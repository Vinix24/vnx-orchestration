_meta:
  source: field-tests t1-t6 benchmark (export_routing_matrix.py)
  scale: composite_score 0-10 (benchmark 0-5 x2)
  honesty: score = genuine attempts (wall>=5s, capability-0s included); launch_success_rate
    carries reliability; runner is first-class
  scope: 'WORKER lane routing ONLY. A model''s score here = how well it PRODUCES a
    scored deliverable. It is NOT the gate-model policy: gate-panel composition (adversarial
    defect-finding, e.g. codex ''almost always finds something'' on PR-4/PR-9) is
    a SEPARATE PM-skill policy driven by proven defect-recall + family diversity.
    A low worker score NEVER removes a model from the gate role.'
