# ============================================================================
# ROADMAP.yaml is the SINGLE SOURCE OF TRUTH for the VNX feature roadmap.
#
# It is the only hand-edited planning surface. Two views are GENERATED from it
# and must never be hand-edited:
#   - FEATURE_PLAN.md  <- scripts/build_feature_plan.py
#   - PR_QUEUE.md      <- scripts/build_pr_queue.py
#
# After editing this file, regenerate both views and commit them together:
#   python3 scripts/build_feature_plan.py
#   python3 scripts/build_pr_queue.py
# CI guards this: tests/test_roadmap_consistency.py runs the generators with
# --check and fails the build if either view drifts from this file.
#
# claudedocs/*.md (e.g. MASTER-PRELAUNCH-PLAN.md, DISPATCH-UNIFICATION-*.md) are
# detailed working/design docs, NOT status SSOT. Their operational status is
# folded into launch_state + features[] here. When a working doc is executed,
# archive it under claudedocs/_archive/ and let this file carry the live state.
#
# This anti-drift rule exists because three planning baselines (this file,
# the generated views, and the claudedocs prelaunch plan) had drifted apart:
# launch_state falsely read "production-validated" while ~10 launch PRs were
# still open. Keep status in ONE place (here); generate the rest.
#
# ADR-007: every new central-DB table needs a composite UNIQUE/PK over
# project_id. Cite it explicitly in review-gate prompts for schema work.
# ============================================================================

roadmap_id: vnx-roadmap-autopilot
