      reactivated self-learning loop (GAP 4) was re-injecting ~93% duplicate
      patterns — a handful of high-frequency patterns dominated every
      injection cycle, starving diversity and making the loop low-value
      despite running nightly. Root-caused to history-blind selection. Fix
      makes injection selection injection-history-aware so already-injected
      patterns are suppressed, breaking the duplicate-dominance feedback loop
      and restoring injection diversity. This is the substance behind the
      operator question 'does the self-learning loop work correctly again' —
      the loop ran but its output was near-duplicate noise; now it surfaces
      fresh patterns.

