# ============================================================================
# ROADMAP.yaml is the SINGLE SOURCE OF TRUTH for the VNX feature roadmap.
#
# It is the only hand-edited planning surface. Two views are GENERATED from it
# and must never be hand-edited:
#   - FEATURE_PLAN.md  <- roadmap/features/roadmap-autopilot/scripts/build_feature_plan.py
#   - PR_QUEUE.md      <- roadmap/features/roadmap-autopilot/scripts/build_pr_queue.py
#
# After editing this file, regenerate both views and commit them together:
#   python roadmap/features/roadmap-autopilot/scripts/build_feature_plan.py
#   python roadmap/features/roadmap-autopilot/scripts/build_pr_queue.py
# CI guards this: tests/test_roadmap_consistency.py runs the generators with
# --check and fails the build if either view drifts from this file.
#
# claudedocs/*.md (e.g. MASTER-PRELAUNCH-PLAN.md, DISPATCH-UNIFICATION-*.md) are
# detailed working/design docs, NOT status SSOT. Their operational status is
# folded into launch_state + features[] here. When a working doc is executed,
# archive it under claudedocs/_archive/ and let this file carry the live state.
#
# This anti-drift rule exists because three planning baselines (this file,
# the generated views, and the claudedocs prelaunch plan) had drifted apart:
# launch_state falsely read "production-validated" while ~10 launch PRs were
# still open. Keep status in ONE place (here); generate the rest.
#
# ADR-007: every new central-DB table needs a composite UNIQUE/PK over
# project_id. Cite it explicitly in review-gate prompts for schema work.
# ============================================================================

roadmap_id: vnx-roadmap-autopilot
title: VNX Multi-Feature Roadmap

launch_state:
  version: "1.0.0"
  date: "2026-05-31"             # last update to this launch_state block
  status: "pre-launch"            # in-flight clean-launch queue, NOT shipped
  target_date: "2026-06-02"       # HN/Reddit launch target
  last_verified: "2026-05-31"
  verified_against: "origin/main@7ced5309"
  note: >
    1.0.0 is in pre-launch hardening and is NOT yet published. As of 2026-05-31
    the clean-launch queue is ten open PRs (#756-#765) plus the ADR-020 contract
    doc (#751). Pre-publish security hardening already merged on main (#752,
    #753). The queue is gated, not done: several PRs are CONFLICTING and need
    rebase onto the freeze trio, and the codex gate is quota-exhausted until
    ~20:28 on 2026-05-31. The forced merge order is #756 (hygiene) -> #759
    (renames, alone; grep-zero + 4 runtime smoke-tests + net-deletion sanity
    check) -> #760 + #761 (freeze trio) -> capability interim (#764; close the
    #762 duplicate) + #763 (kimi) + #765 (deepseek lane) + #757/#758 (docs/scrub)
    -> Option B parity (prepare()/govern()) -> LB-3 (rebuild wheel + zero-hit
    security grep on THAT exact artifact + fresh-venv acceptance + PyPI). LB-3 is
    the final immutable gate (PyPI is write-once). Honesty constraint: the
    claude-subprocess lane is the true-honor reference; other lanes are governed
    at soft/conditional enforcement and marked as such in every receipt. No
    "worker-authored on every lane" or "as good as Sonnet" claim ships until
    measured. Self-learning loop is runnable (auto-dream shipped) but its nightly
    trigger and central-path unification stay dormant. Smart routing
    (VNX_AUTO_ROUTE) and pool task consumer (VNX_POOL_TASK_CONSUMER) are shipped
    opt-in. Roadmap autopilot tick (RA-6) ships dark (default off).
  launch_blockers:
    - "#756 Wave 0 hygiene (untrack .venv, strip slop)"
    - "#759 renames (merge alone; grep-zero + smoke-tests + net-deletion sanity)"
    - "#760 role-based manager block + auto-inject footer"
    - "#761 provider-aware intelligence + receipt token/cost linkage"
    - "#764 capability-scoping interim (close #762 duplicate; acceptEdits headless no-stall smoke-test)"
    - "#763 kimi robust spawn + fail-loud"
    - "#765 governed DeepSeek-harness lane"
    - "Option B parity: prepare()/govern() uniform across lanes (not yet PR'd)"
    - "SSOT reconciliation (this file) + regenerated FEATURE_PLAN.md/PR_QUEUE.md"
    - "LB-3 rebuild + zero-hit grep on the exact wheel + PyPI publish"

