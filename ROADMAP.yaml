  - feature_id: pm-gate-agent-automation
    title: "PM-gate agent automation — event-driven per-receipt roadmap maintenance"
    risk_class: medium
    merge_policy: human
    review_stack:
      - kimi_review
    depends_on:
      - planning-future-state-layer
      - oi-lifecycle-closure
      - gemma-4-12b-integration
    milestone: "1.x"
    status: planned
    notes: >
      The PM-gate (roadmap mutation / track-close decision) need not be
      human-driven. A tiered model-agent runs the PM checks per receipt:
      deterministic / high-confidence closes are auto-applied (each with a
      receipt for the audit trail); ambiguous cases escalate to a stronger
      model or the human gate, preserving human-in-the-loop on the judgment
      tail. Key design points: (1) EVENT-DRIVEN per-receipt — fired by the
      receipt processor on each dispatch completion, NOT a living daemon, so
      it runs exactly when there is new state to reconcile. (2) TIERED MODEL —
      a cheap LOCAL model (gemma-4-12B via Ollama on the Mac Mini, or haiku)
      handles the high-frequency mechanical checks: zero API cost, fast, and
      Anthropic-cutoff-resilient (the local tier keeps working if the
      subscription/headless lane is disrupted); judgment cases escalate to
      sonnet or the human. (3) The advisory rollup reconciler already computes
      derived_status deterministically with no LLM (planning-future-state-
      layer Phase 3, #793), so the agent only handles the judgment tail on top
      of the deterministic truth — deterministic auto-close, ambiguous to the
      human gate. Relates to the 1.x items already filed as issues: #866
      (event-stream-primary measurement — the agent's normalized input
      substrate), #867 (OI-bridge exactly-once outbox), #868 (governance
      observability), #869 (operator runbook automation), #864 (broader
      ADR-007 batch). Depends on the reconciler (deterministic derived_status)
      and the local-lane evaluation (gemma-4-12b-integration) being in place.
