<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=630">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');

  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0A2463;
    color: #ffffff;
    display: flex;
    overflow: hidden;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 60px 72px;
    position: relative;
  }

  /* Subtle grid pattern */
  .container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Orange accent bar top */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #F97316;
  }

  .header {
    position: relative;
    z-index: 1;
  }

  .header h2 {
    font-size: 22px;
    font-weight: 600;
    color: #F97316;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  .stats {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-row {
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .stat-number {
    font-size: 82px;
    font-weight: 900;
    line-height: 1;
    min-width: 280px;
    text-align: right;
    letter-spacing: -2px;
  }

  .stat-number.highlight {
    color: #F97316;
  }

  .stat-label {
    font-size: 28px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.5px;
  }

  .footer {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .author {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .author-name {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
  }

  .author-url {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(249, 115, 22, 0.15);
    border: 1px solid rgba(249, 115, 22, 0.3);
    border-radius: 6px;
    padding: 10px 20px;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #F97316;
  }

  .badge-text {
    font-size: 15px;
    font-weight: 600;
    color: #F97316;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="accent-bar"></div>

    <div class="header">
      <h2>Glass Box Governance</h2>
      <div class="subtitle">Multi-Agent AI Audit Architecture</div>
    </div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-number">2,472</span>
        <span class="stat-label">dispatches processed</span>
      </div>
      <div class="stat-row">
        <span class="stat-number">4</span>
        <span class="stat-label">AI terminals in parallel</span>
      </div>
      <div class="stat-row">
        <span class="stat-number">6</span>
        <span class="stat-label">months in production</span>
      </div>
      <div class="stat-row">
        <span class="stat-number highlight">0</span>
        <span class="stat-label">unaudited actions</span>
      </div>
    </div>

    <div class="footer">
      <div class="author">
        <span class="author-name">Vincent van Deth</span>
        <span class="author-url">vincentvandeth.nl</span>
      </div>
      <div class="badge">
        <span class="badge-dot"></span>
        <span class="badge-text">Open Source</span>
      </div>
    </div>
  </div>
</body>
</html>
